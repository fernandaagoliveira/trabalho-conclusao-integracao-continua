# Nome da pipeline que é exibida para o Workflow  no GitHub 
name: Pipeline CI/CD

# Eventos que disparam a execução da pipeline
on:
  # Disparo 1: Executar automaticamente quando houver push na branch main
  push:
    branches:
      - main

  # Disparo 2: Permitir execução manual através do botão no GitHub    
  workflow_dispatch:

  # Disparo 3: Execução agendada todo dia ao meio-dia (horário de Brasília)
  schedule:
    - cron: '0 15 * * *'  # 15h UTC = 12h (meio-dia) no Brasil

# Define os trabalhos que serão executados
jobs:
  # Nome do job: test
  test:
    # Sistema operacional onde o job vai rodar
    runs-on: ubuntu-latest

    # Passos que serão executados neste job
    steps:
      # Passo 1: Fazer checkout do código do repositório
      - name: Checkout do código
        uses: actions/checkout@v4

      # Passo 2: Configurar o Node.js
      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Passo 3: Instalar as dependências do projeto
      - name: Instalar dependências
        run: npm install

      # Passo 4: Executar os testes com Mochawesome
      - name: Executar testes
        run: npm test

      # Passo 5: Upload do relatório de testes como artefato
      - name: Upload do relatório Mochawesome
        if: always()  # Executa mesmo se os testes falharem
        uses: actions/upload-artifact@v4
        with:
          name: relatorio-testes
          path: mochawesome-report/